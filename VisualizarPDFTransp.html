<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Visualizador de Comprovante</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
  padding: 0;
}

header {
  background: linear-gradient(90deg, #c62828, #ff6f00);
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
  padding: 10px;
  width: 200px;
  font-size: 14px;
  margin-right: 10px;
}

button {
  padding: 10px 15px;
  background: #c62828;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #b71c1c;
}

.actions {
  margin-top: 10px;
}

iframe {
  width: 100%;
  height: 600px;
  border: 1px solid #ccc;
  margin-top: 20px;
  border-radius: 8px;
}

.status {
  margin-top: 10px;
  font-weight: bold;
}

.erro { color: red; }
.ok { color: green; }

footer {
  text-align: center;
  padding: 10px;
  margin-top: 20px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<header>
  <h2>📄 Visualizador de Comprovante (Sankhya)</h2>
</header>

<div class="container">

  <h3>Consultar por Pedido (NUNOTA)</h3>

  <input type="text" id="nunota" placeholder="Digite o NUNOTA">
  <button onclick="carregarPDF()">Visualizar</button>

  <div class="status" id="status"></div>

  <div class="actions" id="acoes" style="display:none;">
    <button onclick="abrirNova()">🔗 Abrir em nova aba</button>
    <button onclick="baixar()">⬇️ Download</button>
  </div>

  <iframe id="viewer" style="display:none;"></iframe>

</div>

<footer>
  © Top Cestas - Visualização direta Sankhya
</footer>

<script>

// 🔧 ALTERE AQUI
const BASE_URL = "http://topcesta.fwc.cloud:8180/";

let urlAtual = "";

// =========================
// 🚀 CARREGAR PDF
// =========================
function carregarPDF() {

  const nunota = document.getElementById('nunota').value.trim();
  const status = document.getElementById('status');
  const viewer = document.getElementById('viewer');
  const acoes = document.getElementById('acoes');

  viewer.style.display = "none";
  acoes.style.display = "none";

  if (!nunota) {
    status.className = "status erro";
    status.innerHTML = "❌ Informe o número do pedido";
    return;
  }

  // URL direta Sankhya
  urlAtual = `${BASE_URL}/mge/TGFCAB@AD_COMPROVTRANSP@NUNOTA=${nunota}.dbimage`;

  status.className = "status";
  status.innerHTML = "⏳ Carregando...";

  // tenta carregar
  viewer.src = urlAtual;
  viewer.style.display = "block";

  // timeout simples de feedback
  setTimeout(() => {
    status.className = "status ok";
    status.innerHTML = "✅ Se estiver logado no Sankhya, o PDF deve aparecer abaixo";
    acoes.style.display = "block";
  }, 1500);
}

// =========================
// 🔗 NOVA ABA
// =========================
function abrirNova() {
  if (urlAtual) {
    window.open(urlAtual, "_blank");
  }
}

// =========================
// ⬇️ DOWNLOAD
// =========================
function baixar() {
  if (urlAtual) {
    const a = document.createElement('a');
    a.href = urlAtual;
    a.target = "_blank";
    a.click();
  }
}

</script>

</body>
</html>
