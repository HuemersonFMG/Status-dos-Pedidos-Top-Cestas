<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status do Pedido</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
  background: #fff;
}

.status {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

.ok { color: green; }
.warn { color: orange; }
.erro { color: red; }

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index: 9999;
  flex-direction: column;
}

.viewer {
  max-width: 90%;
  max-height: 80%;
  overflow: hidden;
}

.viewer img {
  max-width: 100%;
  max-height: 100%;
  transform-origin: center;
  transition: transform 0.2s;
}

.viewer iframe {
  width: 90vw;
  height: 80vh;
  border: none;
}

.controls {
  margin-top: 10px;
}

.controls button {
  margin: 5px;
  padding: 8px 12px;
  cursor: pointer;
}

.close {
  position: absolute;
  top: 15px;
  right: 20px;
  color: white;
  font-size: 28px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📦 Status do Pedido</h2>

<div id="conteudo"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <span class="close" onclick="fechar()">✖</span>

  <div class="viewer" id="viewer"></div>

  <div class="controls" id="controls"></div>
</div>

<script>

// =========================
// 🔗 PARAMS
// =========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

// =========================
// ⏱️ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, timeout = 20000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo esgotado")), timeout)
    )
  ]);
}

// =========================
// 🎛️ CONTROLE VISUAL
// =========================
let escala = 1;
let rotacao = 0;

function zoomIn() {
  escala += 0.2;
  atualizarTransform();
}

function zoomOut() {
  escala -= 0.2;
  atualizarTransform();
}

function girar() {
  rotacao += 90;
  atualizarTransform();
}

function atualizarTransform() {
  const img = document.getElementById("imgViewer");
  if (img) {
    img.style.transform = `scale(${escala}) rotate(${rotacao}deg)`;
  }
}

// =========================
// 🔍 ABRIR ARQUIVO
// =========================
function abrirArquivo(arq) {

  const popup = document.getElementById('popup');
  const viewer = document.getElementById('viewer');
  const controls = document.getElementById('controls');

  viewer.innerHTML = "";
  controls.innerHTML = "";

  escala = 1;
  rotacao = 0;

  // =====================
  // 🖼️ IMAGEM
  // =====================
  if (arq.tipo === "img") {

    viewer.innerHTML = `<img id="imgViewer" src="${arq.url}">`;

    controls.innerHTML = `
      <button onclick="zoomIn()">➕ Zoom</button>
      <button onclick="zoomOut()">➖ Zoom</button>
      <button onclick="girar()">🔄 Girar</button>
      <button onclick="baixar('${arq.url}')">⬇️ Download</button>
    `;
  }

  // =====================
  // 📄 PDF
  // =====================
  else if (arq.tipo === "pdf") {

    viewer.innerHTML = `
      <iframe src="${arq.url}"></iframe>
    `;

    controls.innerHTML = `
      <button onclick="window.open('${arq.url}','_blank')">🔗 Abrir PDF</button>
      <button onclick="baixar('${arq.url}')">⬇️ Download</button>
    `;
  }

  popup.style.display = "flex";
}

// =========================
// ⬇️ DOWNLOAD
// =========================
function baixar(url) {
  const a = document.createElement('a');
  a.href = url;
  a.target = "_blank";
  a.click();
}

// =========================
// ❌ FECHAR
// =========================
function fechar() {
  document.getElementById('popup').style.display = "none";
}

// =========================
// 🚀 CARREGAR
// =========================
async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  const div = document.getElementById('conteudo');

  if (!nunota || !token) {
    div.innerHTML = "<p class='erro'>❌ Link inválido</p>";
    return;
  }

  div.innerHTML = "⏳ Carregando...";

  try {

    const res = await fetchComTimeout(`/api/pedido?nunota=${nunota}&token=${token}`);

    const texto = await res.text();

    let data;

    try {
      data = JSON.parse(texto);
    } catch {
      console.error("❌ HTML retornado:", texto);
      throw new Error("Resposta inválida do servidor");
    }

    if (!res.ok) {
      throw new Error(data.erro || "Erro ao consultar");
    }

    if (!data.rows || !data.rows.length) {
      div.innerHTML = "<p class='warn'>⚠️ Pedido não encontrado</p>";
      return;
    }

    const p = data.rows[0];
    const arq = p.ARQUIVO;

    div.innerHTML = `
      <div class="card">
        <p><b>Pedido:</b> ${p.NUNOTA}</p>
        <p><b>Cliente:</b> ${p.NOMEPARC}</p>
        <p><b>Documento:</b> ${p.CGC_CPF || "-"}</p>

        <p class="status">${p.ST_ENTREGAS}</p>

        <p><b>Comprovante:</b> ${p.STATUS_FOTO}</p>

        ${
          arq
          ? `<p style="color:blue;cursor:pointer"
                onclick='abrirArquivo(${JSON.stringify(arq)})'>
                📎 Visualizar comprovante
            </p>`
          : `<p>📷 Sem comprovante disponível</p>`
        }
      </div>
    `;

  } catch (err) {

    console.error("❌ Erro:", err);

    div.innerHTML = `<p class="erro">❌ ${err.message}</p>`;
  }
}

// START
carregar();

</script>

</body>
</html>
