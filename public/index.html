<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status do Pedido</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
}

.status {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

img {
  max-width: 100%;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 8px;
}

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<h2>рџ“¦ Status do Pedido</h2>

<div id="conteudo"></div>

<div class="popup" id="popup" onclick="fechar()">
  <img id="imgPopup">
</div>

<script>

// =========================
// рџ”— PEGAR PARAM
// =========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

// =========================
// рџ–јпёЏ DEFINIR IMAGEM
// =========================
function getImagem(p) {

  // рџ”Ґ prioridade backend
  if (p.TIPO_FOTO === 1) {
    return `http://topcesta.fwc.cloud:8180/mge/AD_APPENTFOTO@FOTO@NUNOTA=${p.NUNOTA}@SEQ=1.dbimage`;
  }

  if (p.TIPO_FOTO === 2) {
    return `http://topcesta.fwc.cloud:8180/mge/TGFCAB@AD_COMPROVTRANSP@NUNOTA=${p.NUNOTA}.dbimage`;
  }

  return null;
}

// =========================
// рџљЂ CARREGAR
// =========================
async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  if (!nunota || !token) {
    document.body.innerHTML = "вќЊ Link invГЎlido";
    return;
  }

  try {

    const res = await fetch(`/api/pedido?nunota=${nunota}&token=${token}`);

    const texto = await res.text();

    let data;

    try {
      data = JSON.parse(texto);
    } catch {
      throw new Error("Resposta invГЎlida do servidor");
    }

    if (!res.ok) {
      throw new Error(data.erro || "Erro ao consultar pedido");
    }

    if (!data.rows || !data.rows.length) {
      document.body.innerHTML = "вљ пёЏ Pedido nГЈo encontrado";
      return;
    }

    const p = data.rows[0];

    const div = document.getElementById('conteudo');

    const img = getImagem(p);

    div.innerHTML = `
      <div class="card">
        <p><b>Pedido:</b> ${p.NUNOTA}</p>
        <p><b>Cliente:</b> ${p.NOMEPARC}</p>
        <p><b>Documento:</b> ${p.CGC_CPF || "-"}</p>

        <p class="status">${p.ST_ENTREGAS}</p>

        <p><b>Status Foto:</b> ${p.STATUS_FOTO || "Sem info"}</p>

        ${
          img
          ? `<img src="${img}" onclick="abrir(this.src)">`
          : `<p>рџ“· Sem foto disponГ­vel</p>`
        }
      </div>
    `;

  } catch (err) {
    console.error("вќЊ Erro:", err);
    document.body.innerHTML = `вќЊ ${err.message}`;
  }
}

// =========================
// рџ”Ќ POPUP
// =========================
function abrir(src) {
  document.getElementById('popup').style.display = "flex";
  document.getElementById('imgPopup').src = src;
}

function fechar() {
  document.getElementById('popup').style.display = "none";
}

// START
carregar();

</script>

</body>
</html>
