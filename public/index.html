<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status do Pedido</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
}

.status {
  font-size: 20px;
  font-weight: bold;
}

img {
  max-width: 100%;
  margin-top: 15px;
  cursor: pointer;
}

.sem-foto {
  margin-top: 15px;
  color: #888;
  font-style: italic;
}

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<h2>📦 Status do Pedido</h2>

<div id="conteudo">Carregando...</div>

<div class="popup" id="popup" onclick="fechar()">
  <img id="imgPopup">
</div>

<script>

function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

// 🚀 BUSCAR IMAGEM NA API
async function carregarImagem(nunota) {
  try {
    const res = await fetch(`/api/nota/${nunota}/foto`);

    if (!res.ok) return null;

    const data = await res.json();

    return data.imagem || null;

  } catch (e) {
    console.error('Erro ao carregar imagem:', e);
    return null;
  }
}

async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  if (!nunota || !token) {
    document.body.innerHTML = "Link inválido";
    return;
  }

  try {

    const res = await fetch(`/api/pedido?nunota=${nunota}&token=${token}`);
    const data = await res.json();

    if (!data.rows || !data.rows.length) {
      document.body.innerHTML = "Pedido não encontrado";
      return;
    }

    const p = data.rows[0];

    const div = document.getElementById('conteudo');

    // 🔥 BUSCAR IMAGEM SEPARADO
    let imagem = await carregarImagem(p.NUNOTA);

    let htmlImagem = '';

    if (imagem) {
      htmlImagem = `
        <img src="${imagem}" onclick="abrir('${imagem}')">
      `;
    } else {
      htmlImagem = `<div class="sem-foto">📷 Sem foto disponível</div>`;
    }

    div.innerHTML = `
      <div class="card">
        <p><b>Pedido:</b> ${p.NUNOTA}</p>
        <p><b>Cliente:</b> ${p.NOMEPARC}</p>
        <p><b>Documento:</b> ${p.CGC_CPF} (${p.TIPO_DOC})</p>
        <p class="status">${p.ST_ENTREGAS}</p>
        <p><b>Status Foto:</b> ${p.STATUS_FOTO}</p>

        ${htmlImagem}
      </div>
    `;

  } catch (e) {
    console.error(e);
    document.body.innerHTML = "Erro ao carregar pedido";
  }
}

// POPUP
function abrir(src) {
  document.getElementById('popup').style.display = "flex";
  document.getElementById('imgPopup').src = src;
}

function fechar() {
  document.getElementById('popup').style.display = "none";
}

carregar();

</script>

</body>
</html>
