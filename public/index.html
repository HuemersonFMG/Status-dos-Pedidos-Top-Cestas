<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status do Pedido</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
  background: #fff;
}

.status {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

.ok { color: green; }
.warn { color: orange; }
.erro { color: red; }

.preview {
  max-width: 100%;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 8px;
}

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index: 9999;
}

.popup-content {
  position: relative;
  max-width: 90%;
  max-height: 90%;
}

.popup img, .popup iframe {
  max-width: 100%;
  max-height: 100%;
  border-radius: 8px;
}

.close {
  position: absolute;
  top: -30px;
  right: 0;
  color: white;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📦 Status do Pedido</h2>

<div id="conteudo"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close" onclick="fechar()">✖</span>
    <div id="popupBody"></div>
  </div>
</div>

<script>

// =========================
// 🔗 PEGAR PARAM
// =========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

// =========================
// ⏱️ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, timeout = 15000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo de resposta esgotado")), timeout)
    )
  ]);
}

// =========================
// 📷 DEFINIR URL ARQUIVO
// =========================
function getArquivo(p) {

  if (p.TIPO_FOTO === 1) {
    return {
      url: `http://topcesta.fwc.cloud:8180/mge/AD_APPENTFOTO@FOTO@NUNOTA=${p.NUNOTA}@SEQ=1.dbimage`,
      tipo: "img"
    };
  }

  if (p.TIPO_FOTO === 2) {
    return {
      url: `http://topcesta.fwc.cloud:8180/mge/TGFCAB@AD_COMPROVTRANSP@NUNOTA=${p.NUNOTA}.dbimage`,
      tipo: "auto" // pode ser PDF ou imagem
    };
  }

  return null;
}

// =========================
// 🔍 ABRIR POPUP
// =========================
function abrirArquivo(arq) {

  const popup = document.getElementById('popup');
  const body = document.getElementById('popupBody');

  body.innerHTML = "";

  // 🔥 tentativa inteligente
  if (arq.tipo === "img") {
    body.innerHTML = `<img src="${arq.url}">`;
  } else {
    // tenta abrir como PDF
    body.innerHTML = `
      <iframe src="${arq.url}" frameborder="0"></iframe>
      <p style="color:white;margin-top:10px;">
        Se não abrir, <a href="${arq.url}" target="_blank" style="color:yellow;">clique aqui</a>
      </p>
    `;
  }

  popup.style.display = "flex";
}

// =========================
// ❌ FECHAR POPUP
// =========================
function fechar() {
  document.getElementById('popup').style.display = "none";
}

// =========================
// 🚀 CARREGAR
// =========================
async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  const div = document.getElementById('conteudo');

  if (!nunota || !token) {
    div.innerHTML = "<p class='erro'>❌ Link inválido</p>";
    return;
  }

  div.innerHTML = "⏳ Carregando pedido...";

  try {

    const res = await fetchComTimeout(`/api/pedido?nunota=${nunota}&token=${token}`);

    const texto = await res.text();

    let data;

    try {
      data = JSON.parse(texto);
    } catch {
      console.error("❌ HTML retornado:", texto);
      throw new Error("Servidor retornou resposta inválida");
    }

    if (!res.ok) {
      throw new Error(data.erro || "Erro ao consultar pedido");
    }

    if (!data.rows || !data.rows.length) {
      div.innerHTML = "<p class='warn'>⚠️ Pedido não encontrado</p>";
      return;
    }

    const p = data.rows[0];

    const arq = getArquivo(p);

    div.innerHTML = `
      <div class="card">
        <p><b>Pedido:</b> ${p.NUNOTA}</p>
        <p><b>Cliente:</b> ${p.NOMEPARC}</p>
        <p><b>Documento:</b> ${p.CGC_CPF || "-"}</p>

        <p class="status">${p.ST_ENTREGAS}</p>

        <p><b>Status Comprovante:</b> ${p.STATUS_FOTO}</p>

        ${
          arq
          ? `
            <div onclick='abrirArquivo(${JSON.stringify(arq)})'>
              <p style="cursor:pointer;color:blue;">📎 Ver comprovante</p>
            </div>
          `
          : `<p>📷 Sem comprovante disponível</p>`
        }
      </div>
    `;

  } catch (err) {

    console.error("❌ Erro:", err);

    div.innerHTML = `<p class="erro">❌ ${err.message}</p>`;
  }
}

// START
carregar();

</script>

</body>
</html>
