<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status do Pedido</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
}

.status {
  font-size: 20px;
  font-weight: bold;
}

img {
  max-width: 100%;
  margin-top: 15px;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<h2>📦 Status do Pedido</h2>

<div id="conteudo"></div>

<div class="popup" id="popup" onclick="fechar()">
  <img id="imgPopup">
</div>

<script>

function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  if (!nunota || !token) {
    document.body.innerHTML = "Link inválido";
    return;
  }

  const res = await fetch(`/api/pedido?nunota=${nunota}&token=${token}`);
  const data = await res.json();

  if (!data.rows || !data.rows.length) {
    document.body.innerHTML = "Pedido não encontrado";
    return;
  }

  const p = data.rows[0];

  const div = document.getElementById('conteudo');

  div.innerHTML = `
    <div class="card">
      <p><b>Pedido:</b> ${p.NUNOTA}</p>
      <p><b>Cliente:</b> ${p.NOMEPARC}</p>
      <p class="status">${p.ST_ENTREGAS}</p>

      <img src="http://topcesta.fwc.cloud:8180/mge/AD_APPENTFOTO@FOTO@NUNOTA=${p.NUNOTA}@SEQ=1.dbimage"
           onclick="abrir(this.src)">
    </div>
  `;
}

function abrir(src) {
  document.getElementById('popup').style.display = "flex";
  document.getElementById('imgPopup').src = src;
}

function fechar() {
  document.getElementById('popup').style.display = "none";
}

carregar();

</script>

</body>
</html>
