<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status do Pedido</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
  background: #fff;
}

.status {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

.ok { color: green; }
.warn { color: orange; }
.erro { color: red; }

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index: 9999;
  flex-direction: column;
}

.toolbar {
  margin-bottom: 10px;
}

.toolbar button {
  margin: 3px;
  padding: 8px;
  cursor: pointer;
}

.viewer {
  max-width: 90%;
  max-height: 85%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.viewer img {
  max-width: 100%;
  max-height: 100%;
  transition: transform 0.3s;
}

.viewer iframe {
  width: 100%;
  height: 80vh;
  border: none;
  background: #fff;
}

.close {
  position: absolute;
  top: 15px;
  right: 25px;
  color: white;
  font-size: 28px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📦 Status do Pedido</h2>

<div id="conteudo"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <span class="close" onclick="fechar()">✖</span>

  <div class="toolbar" id="toolbar">
    <button onclick="zoomIn()">🔍 +</button>
    <button onclick="zoomOut()">🔍 -</button>
    <button onclick="girar()">🔄 Girar</button>
    <button onclick="resetar()">♻️ Reset</button>
  </div>

  <div class="viewer" id="viewer"></div>
</div>

<script>

// =========================
// 🔗 PARAM
// =========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

// =========================
// ⏱️ FETCH
// =========================
function fetchComTimeout(url, timeout = 15000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo de resposta esgotado")), timeout)
    )
  ]);
}

// =========================
// 🎛️ CONTROLES
// =========================
let scale = 1;
let rotate = 0;
let tipoAtual = null;

function aplicarTransform() {
  const el = document.getElementById('viewer').querySelector('img');
  if (el) {
    el.style.transform = `scale(${scale}) rotate(${rotate}deg)`;
  }
}

function zoomIn() {
  scale += 0.2;
  aplicarTransform();
}

function zoomOut() {
  scale -= 0.2;
  aplicarTransform();
}

function girar() {
  rotate += 90;
  aplicarTransform();
}

function resetar() {
  scale = 1;
  rotate = 0;
  aplicarTransform();
}

// =========================
// 📎 ABRIR ARQUIVO
// =========================
function abrirArquivo(p) {

  const viewer = document.getElementById('viewer');
  const toolbar = document.getElementById('toolbar');

  viewer.innerHTML = "";
  scale = 1;
  rotate = 0;

  // =========================
  // 📄 PDF
  // =========================
  if (p.TIPO_ARQUIVO === "pdf" && p.URL_ARQUIVO) {

    tipoAtual = "pdf";

    toolbar.style.display = "none"; // PDF não usa zoom manual

    viewer.innerHTML = `
      <iframe src="${p.URL_ARQUIVO}"></iframe>
      <p style="color:white;margin-top:10px;">
        Se não abrir, <a href="${p.URL_ARQUIVO}" target="_blank" style="color:yellow;">clique aqui</a>
      </p>
    `;
  }

  // =========================
  // 🖼️ IMG (dbimage)
  // =========================
  else if (p.TIPO_FOTO === 1) {

    tipoAtual = "img";

    toolbar.style.display = "block";

    const url = `http://topcesta.fwc.cloud:8180/mge/AD_APPENTFOTO@FOTO@NUNOTA=${p.NUNOTA}@SEQ=1.dbimage`;

    viewer.innerHTML = `<img src="${url}">`;

    setTimeout(aplicarTransform, 100);
  }

  else {
    alert("Nenhum arquivo disponível");
    return;
  }

  document.getElementById('popup').style.display = "flex";
}

// =========================
// ❌ FECHAR
// =========================
function fechar() {
  document.getElementById('popup').style.display = "none";
}

// =========================
// 🚀 CARREGAR
// =========================
async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  const div = document.getElementById('conteudo');

  if (!nunota || !token) {
    div.innerHTML = "<p class='erro'>❌ Link inválido</p>";
    return;
  }

  div.innerHTML = "⏳ Carregando...";

  try {

    const res = await fetchComTimeout(`/api/pedido?nunota=${nunota}&token=${token}`);

    const texto = await res.text();

    let data;

    try {
      data = JSON.parse(texto);
    } catch {
      console.error("❌ HTML:", texto);
      throw new Error("Resposta inválida do servidor");
    }

    if (!res.ok) {
      throw new Error(data.erro || "Erro ao consultar pedido");
    }

    if (!data.rows || !data.rows.length) {
      div.innerHTML = "<p class='warn'>⚠️ Pedido não encontrado</p>";
      return;
    }

    const p = data.rows[0];

    div.innerHTML = `
      <div class="card">
        <p><b>Pedido:</b> ${p.NUNOTA}</p>
        <p><b>Cliente:</b> ${p.NOMEPARC}</p>
        <p><b>Documento:</b> ${p.CGC_CPF || "-"}</p>

        <p class="status">${p.ST_ENTREGAS}</p>

        <p><b>Comprovante:</b> ${p.STATUS_FOTO}</p>

        ${
          (p.TIPO_ARQUIVO || p.TIPO_FOTO)
          ? `<button onclick='abrirArquivo(${JSON.stringify(p)})'>
               📎 Visualizar comprovante
             </button>`
          : `<p>📷 Sem comprovante disponível</p>`
        }
      </div>
    `;

  } catch (err) {

    console.error("❌ Erro:", err);

    div.innerHTML = `<p class="erro">❌ ${err.message}</p>`;
  }
}

// START
carregar();

</script>

</body>
</html>
