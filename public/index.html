<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status do Pedido</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
  background: #fff;
}

.status {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

.ok { color: green; }
.warn { color: orange; }
.erro { color: red; }

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.viewer {
  position: relative;
  max-width: 95%;
  max-height: 95%;
}

.viewer img, .viewer iframe {
  max-width: 100%;
  max-height: 100%;
  transform-origin: center;
}

/* CONTROLES */
.controls {
  position: absolute;
  top: -45px;
  left: 0;
}

.controls button {
  padding: 5px 10px;
  margin-right: 5px;
  cursor: pointer;
}

.close {
  position: absolute;
  top: -45px;
  right: 0;
  color: white;
  font-size: 22px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📦 Status do Pedido</h2>

<div id="conteudo"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="viewer">

    <div class="controls">
      <button onclick="zoomIn()">➕</button>
      <button onclick="zoomOut()">➖</button>
      <button onclick="rotate()">🔄</button>
    </div>

    <span class="close" onclick="fechar()">✖</span>

    <div id="viewerBody"></div>
  </div>
</div>

<script>

// =========================
// 🔗 PARAMS
// =========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

// =========================
// ⏱️ FETCH TIMEOUT
// =========================
function fetchComTimeout(url, timeout = 20000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo esgotado")), timeout)
    )
  ]);
}

// =========================
// 🔎 CONTROLE VIEWER
// =========================
let scale = 1;
let rotation = 0;

function zoomIn() {
  scale += 0.2;
  aplicarTransform();
}

function zoomOut() {
  scale -= 0.2;
  aplicarTransform();
}

function rotate() {
  rotation += 90;
  aplicarTransform();
}

function aplicarTransform() {
  const el = document.querySelector('#viewerBody img');
  if (el) {
    el.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
  }
}

// =========================
// 🔍 ABRIR ARQUIVO
// =========================
function abrirArquivo(arq) {

  const popup = document.getElementById('popup');
  const body = document.getElementById('viewerBody');

  scale = 1;
  rotation = 0;

  // 🔥 limpa
  body.innerHTML = "";

  if (arq.tipo === "img") {

    body.innerHTML = `<img src="${arq.url}">`;

  } else {

    // 🔥 PDF
    body.innerHTML = `
      <iframe src="${arq.url}" frameborder="0"></iframe>
      <p style="color:white;margin-top:10px">
        Se não visualizar,
        <a href="${arq.url}" target="_blank" style="color:yellow">
          clique aqui
        </a>
      </p>
    `;
  }

  popup.style.display = "flex";
}

// =========================
// ❌ FECHAR
// =========================
function fechar() {
  document.getElementById('popup').style.display = "none";
}

// =========================
// 🚀 CARREGAR
// =========================
async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  const div = document.getElementById('conteudo');

  if (!nunota || !token) {
    div.innerHTML = "<p class='erro'>❌ Link inválido</p>";
    return;
  }

  div.innerHTML = "⏳ Carregando...";

  try {

    const res = await fetchComTimeout(`/api/pedido?nunota=${nunota}&token=${token}`);

    const texto = await res.text();

    let data;

    try {
      data = JSON.parse(texto);
    } catch {
      console.error("❌ HTML retornado:", texto);
      throw new Error("Resposta inválida do servidor");
    }

    if (!res.ok) {
      throw new Error(data.erro || "Erro ao consultar");
    }

    if (!data.rows || !data.rows.length) {
      div.innerHTML = "<p class='warn'>⚠️ Pedido não encontrado</p>";
      return;
    }

    const p = data.rows[0];

    // 🔥 agora vem do backend já correto
    const arq = p.ARQUIVO;

    div.innerHTML = `
      <div class="card">
        <p><b>Pedido:</b> ${p.NUNOTA}</p>
        <p><b>Cliente:</b> ${p.NOMEPARC}</p>
        <p><b>Documento:</b> ${p.CGC_CPF || "-"}</p>

        <p class="status">${p.ST_ENTREGAS}</p>

        <p><b>Comprovante:</b> ${p.STATUS_FOTO}</p>

        ${
          arq
          ? `<p style="color:blue;cursor:pointer" onclick='abrirArquivo(${JSON.stringify(arq)})'>
              📎 Visualizar comprovante
            </p>`
          : `<p>📷 Sem comprovante disponível</p>`
        }
      </div>
    `;

  } catch (err) {

    console.error("❌ Erro:", err);

    div.innerHTML = `<p class="erro">❌ ${err.message}</p>`;
  }
}

// START
carregar();

</script>

</body>
</html>
