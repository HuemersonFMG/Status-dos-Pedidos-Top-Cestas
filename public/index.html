<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tracker de Pedidos</title>

<link rel="stylesheet" href="Styles/Styles.css">
<link rel="icon" href="https://tutoriaissankhya.netlify.app/img/IcoTop.png" type="image/png">

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
}

.card {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  border-radius: 10px;
  background: #fff;
}

.status {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

.ok { color: green; }
.warn { color: orange; }
.erro { color: red; }

.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction: column;
  z-index: 9999;
}

.viewer img {
  max-width: 90vw;
  max-height: 80vh;
  transform-origin: center;
  transition: transform 0.2s;
}

.viewer iframe {
  width: 90vw;
  height: 80vh;
  border: none;
}

.controls button {
  margin: 5px;
  padding: 8px;
}

.close {
  position: absolute;
  top: 15px;
  right: 20px;
  color: white;
  font-size: 28px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <a href="https://topalimentos.shop/produtos/" target="_blank">
    <img src="https://acdn.mitiendanube.com/stores/005/153/537/themes/common/logo-1763652655-1725039982-7ed6073ae2f21d42c151cd86c3596fe41725039982.png?0"
         alt="LogoTopCestas" style="max-height:60px;">
  </a>
  <h1>Status do Pedido</h1>
</header>

<h2>📦 Acompanhamento</h2>

<div id="conteudo"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <span class="close" onclick="fechar()">✖</span>
  <div class="viewer" id="viewer"></div>
  <div class="controls" id="controls"></div>
</div>

<script>

// =========================
// 🔗 PARAMS
// =========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

// =========================
// ⏱️ FETCH
// =========================
async function fetchJSON(url) {
  const res = await fetch(url);
  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.erro || "Erro na requisição");
  }

  return data;
}

// =========================
// 📅 FORMATAR DATA
// =========================
function formatarData(data) {
  if (!data) return "-";
  return new Date(data).toLocaleDateString('pt-BR');
}

// =========================
// 🎛️ CONTROLE IMAGEM
// =========================
let escala = 1;
let rotacao = 0;

function zoomIn() { escala += 0.2; aplicar(); }
function zoomOut() { escala = Math.max(0.2, escala - 0.2); aplicar(); }
function girar() { rotacao += 90; aplicar(); }

function aplicar() {
  const img = document.getElementById("imgViewer");
  if (img) {
    img.style.transform = `scale(${escala}) rotate(${rotacao}deg)`;
  }
}

// =========================
// 🔍 ABRIR ARQUIVO
// =========================
function abrirImagem(url) {

  const viewer = document.getElementById('viewer');
  const controls = document.getElementById('controls');

  viewer.innerHTML = `<img id="imgViewer" src="${url}">`;

  controls.innerHTML = `
    <button onclick="zoomIn()">➕</button>
    <button onclick="zoomOut()">➖</button>
    <button onclick="girar()">🔄</button>
    <button onclick="window.open('${url}')">⬇️</button>
  `;

  document.getElementById('popup').style.display = "flex";
}

function abrirPDF(url) {

  const viewer = document.getElementById('viewer');
  const controls = document.getElementById('controls');

  viewer.innerHTML = `<iframe src="${url}"></iframe>`;

  controls.innerHTML = `
    <button onclick="window.open('${url}')">🔗 Abrir</button>
  `;

  document.getElementById('popup').style.display = "flex";
}

function fechar() {
  document.getElementById('popup').style.display = "none";
}

// =========================
// 🚀 CARREGAR
// =========================
async function carregar() {

  const nunota = getParam('nunota');
  const token = getParam('token');

  const div = document.getElementById('conteudo');

  if (!nunota || !token) {
    div.innerHTML = "<p class='erro'>❌ Link inválido</p>";
    return;
  }

  div.innerHTML = "⏳ Carregando...";

  try {

    const data = await fetchJSON(`/api/pedido?nunota=${nunota}&token=${token}`);
    const p = data.rows[0];

    if (!p) {
      div.innerHTML = "<p class='warn'>Pedido não encontrado</p>";
      return;
    }

    const urlImg = `/api/comprovante/imagem?nunota=${nunota}&token=${token}`;
    const urlPdf = `/api/comprovante/pdf?nunota=${nunota}&token=${token}`;

    div.innerHTML = `
      <div class="card">

        <p><b>📅 Data:</b> ${formatarData(p.DTNEG)}</p>
        <p><b>🚚 Ordem de Carga:</b> ${p.ORDEMCARGA || "-"}</p>

        <hr>

        <p><b>🧾 Pedido:</b> ${p.NUNOTA}</p>
        <p><b>👤 Cliente:</b> ${p.NOMEPARC}</p>
        <p><b>📄 Documento:</b> ${p.CGC_CPF || "-"}</p>
        <p><b>🚛 Transportadora:</b> ${p.TRANSPORTADORA || "-"}</p>

        <hr>

        <p class="status">${p.ST_ENTREGAS}</p>

        <hr>

        <p><b>📎 Comprovante:</b></p>

        ${
          p.TEM_FOTO
            ? `<p style="color:blue;cursor:pointer" onclick="abrirImagem('${urlImg}')">
                 📷 Visualizar Foto
               </p>`
            : p.TEM_PDF
            ? `<p style="color:blue;cursor:pointer" onclick="abrirPDF('${urlPdf}')">
                 📄 Visualizar PDF
               </p>`
            : `<p>Sem comprovante disponível</p>`
        }

      </div>
    `;

  } catch (err) {
    console.error(err);
    div.innerHTML = `<p class="erro">❌ ${err.message}</p>`;
  }
}

// START
carregar();

</script>

<footer>
  <p style="text-align:center;">
    &copy; Top Cestas - 2026 - Monitoramento de Pedidos
  </p>
</footer>

</body>
</html>
