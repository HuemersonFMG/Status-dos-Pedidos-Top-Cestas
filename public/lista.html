<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Cestas Track - Lista de Links</title>
    <link rel="icon" href="https://tutoriaissankhya.netlify.app/img/IcoTop.png" type="image/png">
    <link rel="stylesheet" href="Styles/gerador.css">
  </head>

  <body>
    <header>
      <div class="header-left">
        <a href="https://topalimentos.shop/produtos/">
          <img src="https://acdn.mitiendanube.com/stores/005/153/537/themes/common/logo-1763652655-1725039982-7ed6073ae2f21d42c151cd86c3596fe41725039982.png?0" alt="Logo Top Cestas" width="20%" height="auto">
        </a>
        <h1>Top Cestas</h1>
        <span>Lista Interna de Links Gerados - v1.6.2</span>
      </div>

      <div class="header-actions">
        <button class="btn-manual" onclick="copiarUrlLista()">Copiar URL da Lista</button>
        <button class="btn-download" onclick="baixarTodosLista()">Baixar Todos Comprovantes</button>
        <button class="btn-recarga" onclick="voltarGerador()">Voltar ao Gerador</button>
      </div>
    </header>

    <div class="container">
      <div class="descricao">
        <p class="highlight2">Lista interna consolidada com todos os links gerados para consulta operacional.</p>
      </div>

      <div id="status"></div>

      <div id="download-progress" class="download-progress">
        <div class="loader"></div>
        <div id="download-progress-text">Preparando ZIP...</div>
      </div>

      <div class="resultado" id="resultado"></div>
    </div>

    <footer>Top Cestas Track © 2026 - Sistema de rastreamento integrado Sankhya ERP</footer>

    <script src="Styles/lista.js"></script>
  </body>
</html>
