<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
  border: none;
  border-radius: 5px;
  background: #28a745;
  color: #fff;
}

button:hover {
  background: #218838;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
  background: #007bff;
}

.actions button:hover {
  background: #0069d9;
}

.erro { color: red; }
.sucesso { color: green; }
</style>

</head>

<body>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="doc" placeholder="Digite CPF ou CNPJ">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// 🔥 LIMPAR CPF/CNPJ
function limparDoc(doc) {
  return doc.replace(/\D/g, '');
}

// 🔥 VALIDAR CPF/CNPJ
function validarDoc(doc) {
  if (doc.length === 11) return true; // CPF
  if (doc.length === 14) return true; // CNPJ
  return false;
}

async function gerar() {

  let doc = document.getElementById('doc').value.trim();
  const data = document.getElementById('data').value;

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  doc = limparDoc(doc);

  if (!doc) {
    status.innerHTML = "⚠️ Digite CPF ou CNPJ";
    status.className = "erro";
    return;
  }

  if (!validarDoc(doc)) {
    status.innerHTML = "❌ CPF/CNPJ inválido";
    status.className = "erro";
    return;
  }

  status.innerHTML = "⏳ Gerando links...";
  status.className = "";

  div.innerHTML = "";

  try {

    const res = await fetch('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ doc, data })
    });

    if (!res.ok) {
      throw new Error("Erro HTTP: " + res.status);
    }

    const dataRes = await res.json();

    if (!dataRes.links || !dataRes.links.length) {
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      status.className = "erro";
      return;
    }

    status.innerHTML = `✅ ${dataRes.links.length} link(s) gerado(s)`;
    status.className = "sucesso";

    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <b>Cliente:</b> ${l.nome || '-'}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

  } catch (err) {

    console.error("❌ Erro:", err);

    status.innerHTML = "❌ Erro ao gerar links";
    status.className = "erro";
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link);
  alert("✅ Link copiado!");
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("📦 Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
