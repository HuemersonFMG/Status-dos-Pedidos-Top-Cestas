<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>

</head>

<body>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="Digite CPF ou CNPJ">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// 🔥 NORMALIZAR DOCUMENTO
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// 🔍 GERAR LINKS
// =========================
async function gerar() {

  const cnpjInput = document.getElementById('cnpj').value;
  const data = document.getElementById('data').value;

  const documento = limparDoc(cnpjInput);

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  div.innerHTML = "";

  if (!documento) {
    status.innerHTML = "❌ Digite um CPF ou CNPJ válido";
    return;
  }

  if (documento.length !== 11 && documento.length !== 14) {
    status.innerHTML = "❌ CPF deve ter 11 dígitos ou CNPJ 14";
    return;
  }

  status.innerHTML = "⏳ Gerando links...";

  try {

    console.log("📤 Enviando:", { documento, data });

    const res = await fetch('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cnpj: documento, data })
    });

    console.log("📡 Status HTTP:", res.status);

    const texto = await res.text();

    let dataRes;

    try {
      dataRes = JSON.parse(texto);
    } catch (e) {
      console.error("❌ Resposta inválida:", texto);
      throw new Error("Resposta inválida do servidor");
    }

    if (!res.ok) {
      throw new Error(dataRes.erro || "Erro HTTP: " + res.status);
    }

    console.log("📦 Retorno:", dataRes);

    if (!dataRes.links || !dataRes.links.length) {
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      return;
    }

    status.innerHTML = `✅ ${dataRes.links.length} link(s) gerado(s)`;

    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

  } catch (err) {

    console.error("❌ Erro:", err);

    status.innerHTML = `❌ ${err.message}`;
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link);
  alert("Link copiado!");
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
