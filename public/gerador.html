<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Gerador de Links</title>

  <style>

    body {

      font-family: Arial, sans-serif;
      background: #f5f5f5;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      padding: 40px;
    }

    .container {

      background: white;

      padding: 30px;

      border-radius: 12px;

      width: 100%;
      max-width: 700px;

      box-shadow:
        0 0 10px rgba(0,0,0,0.1);
    }

    h1 {

      margin-top: 0;
      text-align: center;
    }

    .descricao {

      margin-bottom: 25px;

      color: #666;

      text-align: center;

      line-height: 1.5;
    }

    input,
    button {

      width: 100%;

      padding: 12px;

      margin-bottom: 15px;

      border-radius: 8px;

      border: 1px solid #ccc;

      font-size: 15px;

      box-sizing: border-box;
    }

    input:disabled {

      background: #f1f1f1;
      cursor: not-allowed;
    }

    button {

      background: #007bff;

      color: white;

      border: none;

      cursor: pointer;

      font-weight: bold;
    }

    button:hover {

      background: #0056b3;
    }

    .resultado {

      margin-top: 25px;
    }

    .link-item {

      background: #fafafa;

      border: 1px solid #ddd;

      border-radius: 8px;

      padding: 12px;

      margin-bottom: 10px;
    }

    .link-item a {

      word-break: break-all;
      color: #007bff;
    }

    .top-actions {

      display: flex;
      gap: 10px;

      margin-bottom: 20px;
    }

    .top-actions button {

      margin-bottom: 0;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Gerador de Links</h1>

    <div class="descricao">

      Utilize apenas UM filtro por vez.<br>

      Você pode pesquisar múltiplos pedidos ou NFes separados por vírgula.
    </div>

    <input
      type="text"
      id="cnpj"
      placeholder="CPF/CNPJ">

    <input
      type="text"
      id="ordem"
      placeholder="Ordem de Carga">

    <input
      type="text"
      id="pedidos"
      placeholder="Pedidos (ex: 123,456,789)">

    <input
      type="text"
      id="nfes"
      placeholder="NFes (ex: 1001,1002,1003)">

    <input
      type="date"
      id="data">

    <div class="top-actions">

      <button onclick="gerar()">
        Gerar Links
      </button>

      <button onclick="limpar()">
        Limpar
      </button>

    </div>

    <div
      class="resultado"
      id="resultado">
    </div>

  </div>

  <script>

    const cnpjInput =
      document.getElementById('cnpj');

    const ordemInput =
      document.getElementById('ordem');

    const pedidosInput =
      document.getElementById('pedidos');

    const nfesInput =
      document.getElementById('nfes');

    const dataInput =
      document.getElementById('data');

    const resultado =
      document.getElementById('resultado');

    // =========================
    // 🔒 CONTROLE FILTROS
    // =========================
    function atualizarFiltros() {

      const temCnpj =
        !!cnpjInput.value.trim();

      const temOrdem =
        !!ordemInput.value.trim();

      const temPedidos =
        !!pedidosInput.value.trim();

      const temNfes =
        !!nfesInput.value.trim();

      const temData =
        !!dataInput.value;

      // CPF/CNPJ
      cnpjInput.disabled =
        temOrdem ||
        temPedidos ||
        temNfes ||
        temData;

      // ORDEM
      ordemInput.disabled =
        temCnpj ||
        temPedidos ||
        temNfes ||
        temData;

      // PEDIDOS
      pedidosInput.disabled =
        temCnpj ||
        temOrdem ||
        temNfes ||
        temData;

      // NFES
      nfesInput.disabled =
        temCnpj ||
        temOrdem ||
        temPedidos ||
        temData;

      // DATA
      dataInput.disabled =
        temCnpj ||
        temOrdem ||
        temPedidos ||
        temNfes;
    }

    // =========================
    // 🔄 EVENTOS
    // =========================
    cnpjInput.addEventListener(
      'input',
      atualizarFiltros
    );

    ordemInput.addEventListener(
      'input',
      atualizarFiltros
    );

    pedidosInput.addEventListener(
      'input',
      atualizarFiltros
    );

    nfesInput.addEventListener(
      'input',
      atualizarFiltros
    );

    dataInput.addEventListener(
      'input',
      atualizarFiltros
    );

    // =========================
    // 🧹 LIMPAR
    // =========================
    function limpar() {

      cnpjInput.value = '';
      ordemInput.value = '';
      pedidosInput.value = '';
      nfesInput.value = '';
      dataInput.value = '';

      resultado.innerHTML = '';

      cnpjInput.disabled = false;
      ordemInput.disabled = false;
      pedidosInput.disabled = false;
      nfesInput.disabled = false;
      dataInput.disabled = false;
    }

    // =========================
    // 🔗 GERAR LINKS
    // =========================
    async function gerar() {

      resultado.innerHTML =
        'Carregando...';

      const documento =
        cnpjInput.value.trim();

      const ordemCarga =
        ordemInput.value.trim();

      const pedidos =
        pedidosInput.value.trim();

      const nfes =
        nfesInput.value.trim();

      const data =
        dataInput.value;

      const filtros = [

        documento,
        ordemCarga,
        pedidos,
        nfes,
        data

      ].filter(Boolean);

      if (filtros.length !== 1) {

        resultado.innerHTML =
          '<p style=\"color:red\">Utilize apenas UM filtro.</p>';

        return;
      }

      try {

        const response =
          await fetch(
            '/api/gerar-links',
            {

              method: 'POST',

              headers: {

                'Content-Type':
                  'application/json'
              },

              body:
                JSON.stringify({

                  cnpj:
                    documento || null,

                  ordemCarga:
                    ordemCarga || null,

                  pedidos:
                    pedidos || null,

                  nfes:
                    nfes || null,

                  data:
                    data || null
                })
            }
          );

        const json =
          await response.json();

        if (!json.links?.length) {

          resultado.innerHTML =
            '<p>Nenhum resultado encontrado.</p>';

          return;
        }

        resultado.innerHTML = `

          <p>
            Total encontrado:
            <strong>${json.total}</strong>
          </p>

          ${json.links.map(link => `

            <div class="link-item">

              <strong>
                Pedido:
              </strong>

              ${link.nunota}

              ${link.numNota
                ? `<br><strong>NF-e:</strong> ${link.numNota}`
                : ''
              }

              <br><br>

              <a
                href="${link.link}"
                target="_blank">

                ${link.link}

              </a>

            </div>

          `).join('')}
        `;

      } catch (err) {

        console.error(err);

        resultado.innerHTML =
          '<p style=\"color:red\">Erro ao gerar links.</p>';
      }
    }

  </script>

</body>

</html>
