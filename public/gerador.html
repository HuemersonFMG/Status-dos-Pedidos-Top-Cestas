<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.ok { color: green; }
.erro { color: red; }
.warn { color: orange; }

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>

</head>

<body>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="CPF ou CNPJ">
<input type="text" id="ordem" placeholder="Ordem de Carga">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// 🔥 NORMALIZAR
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// 🔒 CONTROLE EXCLUSIVO
// =========================
document.getElementById('cnpj').addEventListener('input', () => {
  document.getElementById('ordem').value = "";
});

document.getElementById('ordem').addEventListener('input', () => {
  document.getElementById('cnpj').value = "";
});

// =========================
// ⏱️ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, options, timeout = 20000) {
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo esgotado")), timeout)
    )
  ]);
}

// =========================
// 🚀 GERAR LINKS
// =========================
async function gerar() {

  const cnpjInput = document.getElementById('cnpj').value;
  const ordemInput = document.getElementById('ordem').value;
  const data = document.getElementById('data').value;

  const cnpj = limparDoc(cnpjInput);
  const ordemCarga = ordemInput.trim();

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  div.innerHTML = "";

  // 🔥 VALIDAÇÃO EXCLUSIVA
  if (!cnpj && !ordemCarga) {
    status.className = "erro";
    status.innerHTML = "❌ Informe CPF/CNPJ ou Ordem de Carga";
    return;
  }

  if (cnpj && ordemCarga) {
    status.className = "erro";
    status.innerHTML = "❌ Use apenas um filtro por vez";
    return;
  }

  status.className = "";
  status.innerHTML = "⏳ Buscando pedidos...";

  try {

    const payload = {
      cnpj: cnpj || null,
      ordemCarga: ordemCarga || null,
      data
    };

    console.log("📤 Enviando:", payload);

    const res = await fetchComTimeout('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const texto = await res.text();

    let dataRes;

    try {
      dataRes = JSON.parse(texto);
    } catch {
      console.error("❌ Retorno inválido:", texto);
      throw new Error("Servidor retornou resposta inválida");
    }

    console.log("📦 Retorno:", dataRes);

    if (!res.ok) {
      throw new Error(dataRes.erro || "Erro ao gerar links");
    }

    if (!dataRes.links || !dataRes.links.length) {
      status.className = "warn";
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      return;
    }

    status.className = "ok";
    status.innerHTML = `✅ ${dataRes.links.length} link(s) encontrado(s)`;

    // 🔥 LIMITAR RENDER (evita travar browser)
    const MAX = 200;

    dataRes.links.slice(0, MAX).forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

    if (dataRes.links.length > MAX) {
      div.innerHTML += `<p class="warn">⚠️ Exibindo apenas ${MAX} resultados</p>`;
    }

  } catch (err) {

    console.error("❌ Erro:", err);

    status.className = "erro";
    status.innerHTML = `❌ ${err.message}`;
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link)
    .then(() => alert("Link copiado"))
    .catch(() => alert("Erro ao copiar"));
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
