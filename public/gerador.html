<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.ok { color: green; }
.erro { color: red; }
.warn { color: orange; }

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>

</head>

<body>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="CPF ou CNPJ">
<input type="text" id="ordemCarga" placeholder="Ordem de Carga">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// 🔥 NORMALIZAR DOC
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// 🔒 BLOQUEIO DE CAMPOS
// =========================
const campoCNPJ = document.getElementById('cnpj');
const campoOrdem = document.getElementById('ordemCarga');

campoCNPJ.addEventListener('input', () => {
  if (campoCNPJ.value.trim()) {
    campoOrdem.disabled = true;
  } else {
    campoOrdem.disabled = false;
  }
});

campoOrdem.addEventListener('input', () => {
  if (campoOrdem.value.trim()) {
    campoCNPJ.disabled = true;
  } else {
    campoCNPJ.disabled = false;
  }
});

// =========================
// ⏱️ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, options, timeout = 20000) {
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo de resposta esgotado")), timeout)
    )
  ]);
}

// =========================
// 🚀 GERAR LINKS
// =========================
async function gerar() {

  const cnpjInput = campoCNPJ.value;
  const ordemInput = campoOrdem.value;
  const data = document.getElementById('data').value;

  const cnpj = limparDoc(cnpjInput);
  const ordemCarga = ordemInput.trim();

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  div.innerHTML = "";

  // 🔥 validação exclusiva
  if ((!cnpj && !ordemCarga) || (cnpj && ordemCarga)) {
    status.className = "erro";
    status.innerHTML = "❌ Informe CPF/CNPJ OU Ordem de Carga (apenas um)";
    return;
  }

  // valida CPF/CNPJ
  if (cnpj && (cnpj.length !== 11 && cnpj.length !== 14)) {
    status.className = "erro";
    status.innerHTML = "❌ CPF deve ter 11 dígitos ou CNPJ 14";
    return;
  }

  status.className = "";
  status.innerHTML = "⏳ Buscando pedidos...";

  try {

    console.log("📤 Enviando:", { cnpj, ordemCarga, data });

    const res = await fetchComTimeout('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cnpj: cnpj || null,
        ordemCarga: ordemCarga || null,
        data
      })
    });

    const texto = await res.text();

    let dataRes;

    try {
      dataRes = JSON.parse(texto);
    } catch {
      console.error("❌ HTML retornado:", texto);
      throw new Error("Servidor retornou resposta inválida");
    }

    if (!res.ok) {
      throw new Error(dataRes.erro || "Erro HTTP: " + res.status);
    }

    console.log("📦 Retorno:", dataRes);

    if (!dataRes.links || !dataRes.links.length) {
      status.className = "warn";
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      return;
    }

    status.className = "ok";
    status.innerHTML = `✅ ${dataRes.links.length} pedido(s) encontrado(s)`;

    // 🔥 LIMITADOR (evita travar tela)
    const limite = 300;

    dataRes.links.slice(0, limite).forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

    if (dataRes.links.length > limite) {
      const aviso = document.createElement('p');
      aviso.className = "warn";
      aviso.innerHTML = `⚠️ Exibindo apenas os primeiros ${limite} resultados`;
      div.appendChild(aviso);
    }

  } catch (err) {

    console.error("❌ Erro:", err);

    status.className = "erro";
    status.innerHTML = `❌ ${err.message}`;
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link)
    .then(() => alert("Link copiado!"))
    .catch(() => alert("Erro ao copiar"));
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
