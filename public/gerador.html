<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.ok { color: green; }
.erro { color: red; }
.warn { color: orange; }

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>

</head>

<body>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="CPF ou CNPJ">
<input type="number" id="ordemCarga" placeholder="Ordem de Carga">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// 🔥 NORMALIZAR
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// 🔒 CONTROLE DE CAMPOS
// =========================
document.getElementById('cnpj').addEventListener('input', () => {
  const cnpj = limparDoc(document.getElementById('cnpj').value);
  const ordem = document.getElementById('ordemCarga');

  if (cnpj.length > 0) {
    ordem.disabled = true;
    ordem.value = "";
  } else {
    ordem.disabled = false;
  }
});

document.getElementById('ordemCarga').addEventListener('input', () => {
  const ordem = document.getElementById('ordemCarga').value;
  const cnpj = document.getElementById('cnpj');

  if (ordem.length > 0) {
    cnpj.disabled = true;
    cnpj.value = "";
  } else {
    cnpj.disabled = false;
  }
});

// =========================
// ⏱️ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, options, timeout = 20000) {
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo de resposta esgotado")), timeout)
    )
  ]);
}

// =========================
// 🚀 GERAR LINKS
// =========================
async function gerar() {

  const cnpjInput = document.getElementById('cnpj').value;
  const ordemInput = document.getElementById('ordemCarga').value;
  const data = document.getElementById('data').value;

  const documento = limparDoc(cnpjInput);
  const ordemCarga = ordemInput ? Number(ordemInput) : null;

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  div.innerHTML = "";

  // 🔒 VALIDAÇÃO
  if (!documento && !ordemCarga) {
    status.className = "erro";
    status.innerHTML = "❌ Informe CPF/CNPJ ou Ordem de Carga";
    return;
  }

  if (documento && ordemCarga) {
    status.className = "erro";
    status.innerHTML = "❌ Use apenas um filtro por vez";
    return;
  }

  if (documento && documento.length !== 11 && documento.length !== 14) {
    status.className = "erro";
    status.innerHTML = "❌ CPF deve ter 11 dígitos ou CNPJ 14";
    return;
  }

  status.className = "";
  status.innerHTML = "⏳ Buscando pedidos...";

  try {

    const payload = {
      cnpj: documento || null,
      ordemCarga: ordemCarga,
      data: data || null
    };

    console.log("📤 Enviando:", payload);

    const res = await fetchComTimeout('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const txt = await res.text();
      console.error("❌ ERRO HTTP:", res.status, txt);
      throw new Error(`Erro ${res.status} ao buscar pedidos`);
    }

    const texto = await res.text();

    let dataRes;
    try {
      dataRes = JSON.parse(texto);
    } catch {
      console.error("❌ NÃO É JSON:", texto);
      throw new Error("Servidor retornou resposta inválida");
    }

    console.log("📦 Retorno:", dataRes);

    if (!dataRes.links || !dataRes.links.length) {
      status.className = "warn";
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      return;
    }

    status.className = "ok";
    status.innerHTML = `✅ ${dataRes.links.length} pedido(s) encontrado(s)`;

    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

  } catch (err) {

    console.error("❌ Erro:", err);

    status.className = "erro";
    status.innerHTML = `❌ ${err.message}`;
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link)
    .then(() => alert("Link copiado!"))
    .catch(() => alert("Erro ao copiar"));
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
