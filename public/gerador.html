<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.ok { color: green; }
.erro { color: red; }
.warn { color: orange; }

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>

</head>

<body>

<h2>рџ”— Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="CPF ou CNPJ">
<input type="text" id="ordem" placeholder="Ordem de Carga">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// рџ”Ґ NORMALIZAГ‡ГѓO
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// рџ”„ CONTROLE DE CAMPOS (OU UM OU OUTRO)
// =========================
document.getElementById('cnpj').addEventListener('input', () => {
  const val = limparDoc(document.getElementById('cnpj').value);
  document.getElementById('ordem').disabled = val.length > 0;
});

document.getElementById('ordem').addEventListener('input', () => {
  const val = document.getElementById('ordem').value.trim();
  document.getElementById('cnpj').disabled = val.length > 0;
});

// =========================
// вЏ±пёЏ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, options, timeout = 20000) {
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo de resposta esgotado")), timeout)
    )
  ]);
}

// =========================
// рџљЂ GERAR LINKS
// =========================
async function gerar() {

  const cnpjInput = document.getElementById('cnpj').value;
  const ordemInput = document.getElementById('ordem').value;
  const data = document.getElementById('data').value;

  const cnpj = limparDoc(cnpjInput);
  const ordemCarga = ordemInput.trim();

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  div.innerHTML = "";

  // рџ”ґ VALIDAГ‡ГѓO
  if (!cnpj && !ordemCarga) {
    status.className = "erro";
    status.innerHTML = "вќЊ Informe CPF/CNPJ OU Ordem de Carga";
    return;
  }

  if (cnpj && ordemCarga) {
    status.className = "erro";
    status.innerHTML = "вќЊ Use apenas um filtro por vez";
    return;
  }

  if (cnpj && (cnpj.length !== 11 && cnpj.length !== 14)) {
    status.className = "erro";
    status.innerHTML = "вќЊ CPF deve ter 11 dГ­gitos ou CNPJ 14";
    return;
  }

  status.className = "";
  status.innerHTML = "вЏі Buscando pedidos...";

  try {

    const payload = {
      cnpj: cnpj || null,
      ordemCarga: ordemCarga || null,
      data: data || null
    };

    console.log("рџ“¤ Enviando:", payload);

    const res = await fetchComTimeout('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const texto = await res.text();

    let dataRes;

    try {
      dataRes = JSON.parse(texto);
    } catch {
      console.error("вќЊ HTML retornado:", texto);
      throw new Error("Resposta invГЎlida do servidor");
    }

    if (!res.ok) {
      throw new Error(dataRes.erro || "Erro HTTP: " + res.status);
    }

    console.log("рџ“¦ Retorno:", dataRes);

    if (!dataRes.links || !dataRes.links.length) {
      status.className = "warn";
      status.innerHTML = "вљ пёЏ Nenhum pedido encontrado";
      return;
    }

    status.className = "ok";
    status.innerHTML = `вњ… ${dataRes.links.length} link(s) gerado(s)`;

    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">рџ“‹ Copiar</button>
          <button onclick="abrir('${l.link}')">рџ”— Abrir</button>
          <button onclick="whatsapp('${l.link}')">рџ“І WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

  } catch (err) {

    console.error("вќЊ Erro:", err);

    status.className = "erro";
    status.innerHTML = `вќЊ ${err.message}`;
  }
}

// =========================
// рџ“‹ COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link)
    .then(() => alert("Link copiado!"))
    .catch(() => alert("Erro ao copiar"));
}

// =========================
// рџ”— ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// рџ“І WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
