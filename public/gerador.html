<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.ok { color: green; }
.erro { color: red; }
.warn { color: orange; }

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="CPF ou CNPJ">
<input type="text" id="ordemCarga" placeholder="Ordem de Carga">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// 🔥 NORMALIZAR DOC
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// 🔁 CONTROLE EXCLUSIVO
// =========================
const cnpjInput = document.getElementById('cnpj');
const ordemInput = document.getElementById('ordemCarga');

cnpjInput.addEventListener('input', () => {
  if (cnpjInput.value.trim()) {
    ordemInput.disabled = true;
    ordemInput.value = "";
  } else {
    ordemInput.disabled = false;
  }
});

ordemInput.addEventListener('input', () => {
  if (ordemInput.value.trim()) {
    cnpjInput.disabled = true;
    cnpjInput.value = "";
  } else {
    cnpjInput.disabled = false;
  }
});

// =========================
// ⏱️ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, options, timeout = 20000) {
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo de resposta esgotado")), timeout)
    )
  ]);
}

// =========================
// 🔍 GERAR LINKS
// =========================
async function gerar() {

  const cnpjRaw = cnpjInput.value;
  const ordemRaw = ordemInput.value;
  const data = document.getElementById('data').value;

  const documento = limparDoc(cnpjRaw);
  const ordem = ordemRaw ? ordemRaw.trim() : null;

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  div.innerHTML = "";

  // =========================
  // 🔥 VALIDAÇÃO
  // =========================
  if (!documento && !ordem) {
    status.className = "erro";
    status.innerHTML = "❌ Informe CPF/CNPJ ou Ordem de Carga";
    return;
  }

  if (documento && ordem) {
    status.className = "erro";
    status.innerHTML = "❌ Use apenas um filtro por vez";
    return;
  }

  if (documento && documento.length !== 11 && documento.length !== 14) {
    status.className = "erro";
    status.innerHTML = "❌ CPF (11) ou CNPJ (14)";
    return;
  }

  status.className = "";
  status.innerHTML = "⏳ Gerando links...";

  try {

    const payload = {
      cnpj: documento || null,
      ordemCarga: ordem || null,
      data: data || null
    };

    console.log("📤 Enviando:", payload);

    const res = await fetchComTimeout('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const texto = await res.text();

    let dataRes;

    try {
      dataRes = JSON.parse(texto);
    } catch {
      console.error("❌ Resposta inválida:", texto);
      throw new Error("Servidor retornou resposta inválida");
    }

    console.log("📦 Retorno:", dataRes);

    if (!res.ok) {
      throw new Error(dataRes.erro || "Erro ao gerar links");
    }

    if (!dataRes.links || !dataRes.links.length) {
      status.className = "warn";
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      return;
    }

    status.className = "ok";
    status.innerHTML = `✅ ${dataRes.links.length} link(s) gerado(s)`;

    // =========================
    // 🔗 LISTAGEM
    // =========================
    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

  } catch (err) {

    console.error("❌ Erro:", err);

    status.className = "erro";
    status.innerHTML = `❌ ${err.message}`;
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link)
    .then(() => alert("Link copiado!"))
    .catch(() => alert("Erro ao copiar"));
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
