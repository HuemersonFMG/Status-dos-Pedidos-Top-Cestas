<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Top - Gerador</title>

<link rel="stylesheet" href="Styles/Styles.css">
<link rel="icon" href="https://tutoriaissankhya.netlify.app/img/IcoTop.png" type="image/png">

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.ok { color: green; }
.erro { color: red; }
.warn { color: orange; }

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <a href="https://topalimentos.shop/produtos/" target="_blank">
    <img src="https://acdn.mitiendanube.com/stores/005/153/537/themes/common/logo-1763652655-1725039982-7ed6073ae2f21d42c151cd86c3596fe41725039982.png?0"
         alt="LogoTopCestas" style="max-height:60px;">
  </a>
  <h1>Entregas - Gerador de Links</h1>
</header>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="CPF ou CNPJ">
<input type="text" id="ordemCarga" placeholder="Ordem de Carga">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// 🔥 NORMALIZAR DOC
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// 🔁 CONTROLE EXCLUSIVO
// =========================
const cnpjInput = document.getElementById('cnpj');
const ordemInput = document.getElementById('ordemCarga');

cnpjInput.addEventListener('input', () => {
  ordemInput.disabled = !!cnpjInput.value.trim();
  if (cnpjInput.value.trim()) ordemInput.value = "";
});

ordemInput.addEventListener('input', () => {
  cnpjInput.disabled = !!ordemInput.value.trim();
  if (ordemInput.value.trim()) cnpjInput.value = "";
});

// =========================
// ⏱️ FETCH COM TIMEOUT
// =========================
function fetchComTimeout(url, options, timeout = 20000) {
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Tempo esgotado")), timeout)
    )
  ]);
}

// =========================
// 🔍 GERAR LINKS
// =========================
async function gerar() {

  const documento = limparDoc(cnpjInput.value);
  const ordem = ordemInput.value.trim() || null;
  const data = document.getElementById('data').value;

  const status = document.getElementById('status');
  const container = document.getElementById('resultado');

  container.innerHTML = "";

  // 🔥 validações
  if (!documento && !ordem) {
    status.className = "erro";
    status.innerHTML = "❌ Informe CPF/CNPJ ou Ordem de Carga";
    return;
  }

  if (documento && ordem) {
    status.className = "erro";
    status.innerHTML = "❌ Use apenas um filtro";
    return;
  }

  if (documento && documento.length !== 11 && documento.length !== 14) {
    status.className = "erro";
    status.innerHTML = "❌ CPF (11) ou CNPJ (14)";
    return;
  }

  status.className = "";
  status.innerHTML = "⏳ Gerando links...";

  try {

    const res = await fetchComTimeout('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cnpj: documento || null,
        ordemCarga: ordem || null,
        data: data || null
      })
    });

    const dataRes = await res.json();

    if (!res.ok) {
      throw new Error(dataRes.erro || "Erro no servidor");
    }

    if (!dataRes.links || !dataRes.links.length) {
      status.className = "warn";
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      return;
    }

    status.className = "ok";
    status.innerHTML = `✅ ${dataRes.total} pedido(s) encontrado(s)`;

    // 🚀 PERFORMANCE (IMPORTANTE)
    const fragment = document.createDocumentFragment();

    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      fragment.appendChild(el);
    });

    container.appendChild(fragment);

  } catch (err) {

    console.error(err);

    status.className = "erro";
    status.innerHTML = `❌ ${err.message}`;
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link)
    .then(() => {
      console.log("Copiado:", link);
    })
    .catch(() => alert("Erro ao copiar"));
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {

  const mensagem = `Acompanhe seu pedido:\n${link}`;
  const url = `https://wa.me/?text=${encodeURIComponent(mensagem)}`;

  window.open(url, "_blank");
}

</script>

<footer>
  <p style="text-align:center;">
    &copy; Top Cestas - 2026 - Rastreamento de Pedidos
  </p>
</footer>

</body>
</html>
