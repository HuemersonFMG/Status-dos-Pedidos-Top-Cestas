<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <title>Top - Gerador</title>

  <link
    rel="stylesheet"
    href="Styles/Styles.css">

  <link
    rel="icon"
    href="https://tutoriaissankhya.netlify.app/img/IcoTop.png">

  <style>

    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    input,
    button {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
    }
    

    #status {
      margin-top: 10px;
      font-weight: bold;
    }

    .ok {
      color: green;
    }

    .erro {
      color: red;
    }

    .warn {
      color: orange;
    }

    .link-box {
      background: #fff;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      word-break: break-all;
    }

    .actions {
      margin-top: 8px;
    }

    .actions button {
      margin-right: 5px;
      font-size: 12px;
    }

    .btndw{
      background-color: rgb(252, 138, 45);
      width: 170px;    /* Largura fixa */
      height: 25px;    /* Altura fixa */
      font-size: 7px; /* Tamanho da fonte */
      padding: 2px 20px; /* Espaçamento interno alternativo */
      text-align: center;
    }

    .btn-gerar{
    background:#4a87fa;
    color:#fff;
    border:1px solid #2d67d6;
  }

  </style>

</head>

<body>

  <header>

    <a href="https://topalimentos.shop/produtos/">

      <img
        src="https://acdn.mitiendanube.com/stores/005/153/537/themes/common/logo-1763652655-1725039982-7ed6073ae2f21d42c151cd86c3596fe41725039982.png?0"
        alt="Logo Top Cestas">

    </a>

    <h1>Gerador de Links de Pedidos</h1>

    <button onclick="baixarTodos()" class="btndw">
      🔝 Baixar Todos Comprovantes
    </button>

    <button onclick="window.open('/docs/manual.html', '_blank')"
      class="btndw">📘 nanual</button>

  </header>

  <h2>🔗 Gerar Links</h2>

  <input
    type="text"
    id="cnpj"
    placeholder="CPF ou CNPJ">

  <input
    type="text"
    id="ordemCarga"
    placeholder="Ordem de Carga">

  <input
    type="text"
    id="pedidos"
    placeholder="Pedidos (ex: 123,456,789)">

  <input
    type="date"
    id="data">

  <button onclick="gerar()" class="btn-gerar">
    Gerar Links Clientes
  </button>

  <div id="status"></div>

  <div id="resultado"></div>

  <script>

    // =========================
    // 🔒 BLOQUEIOS
    // =========================
    document.addEventListener('keydown', function (e) {

      // F12
      if (e.key === 'F12') {

        e.preventDefault();

        return false;
      }

      // CTRL + SHIFT + I/J
      if (
        e.ctrlKey &&
        e.shiftKey &&
        (
          e.key === 'I' ||
          e.key === 'J'
        )
      ) {

        e.preventDefault();

        return false;
      }

      // CTRL + U
      if (
        e.ctrlKey &&
        e.key.toLowerCase() === 'u'
      ) {

        e.preventDefault();

        return false;
      }
    });

    // =========================
    // 📦 VARIÁVEIS GLOBAIS
    // =========================
    let pedidosGerados = [];

    let linksGerados = [];

    // =========================
    // 🔧 HELPERS
    // =========================
    function limparDoc(valor) {

      return (valor || '')
        .replace(/\D/g, '');
    }

    // =========================
    // 🎯 ELEMENTOS
    // =========================
    const cnpjInput =
      document.getElementById('cnpj');

    const ordemInput =
      document.getElementById('ordemCarga');

    const pedidosInput =
      document.getElementById('pedidos');

    const dataInput =
      document.getElementById('data');

    const statusDiv =
      document.getElementById('status');

    const resultadoDiv =
      document.getElementById('resultado');

    // =========================
    // 🔁 CONTROLE FILTROS
    // =========================
    function atualizarFiltros() {

      const temCnpj =
        !!cnpjInput.value.trim();

      const temOrdem =
        !!ordemInput.value.trim();

      const temPedidos =
        !!pedidosInput.value.trim();

      const temData =
        !!dataInput.value;

      // CPF/CNPJ
      cnpjInput.disabled =
        temOrdem ||
        temPedidos ||
        temData;

      // ORDEM
      ordemInput.disabled =
        temCnpj ||
        temPedidos ||
        temData;

      // PEDIDOS
      pedidosInput.disabled =
        temCnpj ||
        temOrdem ||
        temData;

      // DATA
      dataInput.disabled =
        temCnpj ||
        temOrdem ||
        temPedidos;
    }

    // =========================
    // 🎧 EVENTOS
    // =========================
    cnpjInput.addEventListener(
      'input',
      atualizarFiltros
    );

    ordemInput.addEventListener(
      'input',
      atualizarFiltros
    );

    pedidosInput.addEventListener(
      'input',
      atualizarFiltros
    );

    dataInput.addEventListener(
      'input',
      atualizarFiltros
    );

    // =========================
    // 🛡️ FETCH SEGURO
    // =========================
    async function fetchSeguro(
      url,
      options = {}
    ) {

      try {

        const res =
          await fetch(url, options);

        const text =
          await res.text();

        if (!text) {

          throw new Error(
            'Resposta vazia do servidor'
          );
        }

        let data;

        try {

          data = JSON.parse(text);

        } catch {

          console.error(
            '❌ JSON inválido:',
            text
          );

          throw new Error(
            'Erro ao processar resposta'
          );
        }

        if (!res.ok) {

          throw new Error(
            data.erro ||
            'Erro na requisição'
          );
        }

        return data;

      } catch (err) {

        console.error(
          '❌ FETCH:',
          err
        );

        throw err;
      }
    }

    // =========================
    // 🧹 LIMPAR RESULTADO
    // =========================
    function limparResultado() {

      resultadoDiv.innerHTML = '';

      pedidosGerados = [];

      linksGerados = [];
    }

    // =========================
    // 🔍 GERAR LINKS
    // =========================
    async function gerar() {

      limparResultado();

      const documento =
        limparDoc(cnpjInput.value);

      const ordem =
        ordemInput.value.trim();

      const pedidos =
        pedidosInput.value.trim();

      const data =
        dataInput.value;

      // =========================
      // VALIDAÇÃO
      // =========================
      const filtros = [

        documento,
        ordem,
        pedidos,
        data

      ].filter(Boolean);

      if (!filtros.length) {

        statusDiv.className =
          'erro';

        statusDiv.innerHTML =
          '❌ Informe um filtro';

        return;
      }

      if (filtros.length > 1) {

        statusDiv.className =
          'erro';

        statusDiv.innerHTML =
          '❌ Utilize apenas um filtro';

        return;
      }

      // CPF/CNPJ
      if (
        documento &&
        documento.length !== 11 &&
        documento.length !== 14
      ) {

        statusDiv.className =
          'erro';

        statusDiv.innerHTML =
          '❌ CPF/CNPJ inválido';

        return;
      }

      // STATUS
      statusDiv.className = '';

      statusDiv.innerHTML =
        '⏳ Buscando pedidos...';

      try {

        // =========================
        // PAYLOAD
        // =========================
        const payload = {

          cnpj:
            documento || null,

          ordemCarga:
            ordem || null,

          pedidos:
            pedidos || null,

          data:
            data || null
        };

        // =========================
        // API
        // =========================
        const dataRes =
          await fetchSeguro(
            '/api/gerar-links',
            {
              method: 'POST',

              headers: {
                'Content-Type':
                  'application/json'
              },

              body:
                JSON.stringify(payload)
            }
          );

        // =========================
        // SEM RESULTADO
        // =========================
        if (
          !dataRes.links ||
          !dataRes.links.length
        ) {

          statusDiv.className =
            'warn';

          statusDiv.innerHTML =
            '⚠️ Nenhum pedido encontrado';

          return;
        }

        // =========================
        // SALVA PEDIDOS/LINKS
        // =========================
        pedidosGerados =
          dataRes.links.map(
            l => l.nunota
          );

        linksGerados =
          dataRes.links;

        // =========================
        // STATUS
        // =========================
        statusDiv.className =
          'ok';

        statusDiv.innerHTML = `
          ✅ ${dataRes.total}
          pedido(s) encontrado(s)
        `;

        // =========================
        // LISTAGEM
        // =========================
        dataRes.links.forEach(l => {

          const el =
            document.createElement('div');

          el.className =
            'link-box';

          el.innerHTML = `

            <b>Pedido:</b>
            ${l.nunota}

            <br><br>

            <a
              href="${l.link}"
              target="_blank"
            >
              ${l.link}
            </a>

            <div class="actions">

              <button
                onclick="copiar('${l.link}')"
              >
                📋 Copiar
              </button>

              <button
                onclick="abrir('${l.link}')"
              >
                🔗 Abrir
              </button>

              <button
                onclick="whatsapp('${l.link}')"
              >
                📲 WhatsApp
              </button>

            </div>
          `;

          resultadoDiv.appendChild(el);
        });

      } catch (err) {

        console.error(
          '❌ ERRO:',
          err
        );

        statusDiv.className =
          'erro';

        statusDiv.innerHTML = `
          ❌ ${err.message}
        `;
      }
    }

    // =========================
    // 📋 COPIAR
    // =========================
    async function copiar(link) {

      try {

        await navigator.clipboard
          .writeText(link);

        alert(
          '✅ Link copiado'
        );

      } catch (err) {

        console.error(err);

        alert(
          '❌ Erro ao copiar'
        );
      }
    }

    // =========================
    // 🔗 ABRIR
    // =========================
    function abrir(link) {

      window.open(
        link,
        '_blank'
      );
    }

    // =========================
    // 📲 WHATSAPP
    // =========================
    function whatsapp(link) {

      const texto =
        encodeURIComponent(
          `Acompanhe seu pedido:\n${link}`
        );

      window.open(
        `https://wa.me/?text=${texto}`,
        '_blank'
      );
    }

    // =========================
    // ⬇️ BAIXAR TODOS
    // =========================
    async function baixarTodos() {

      if (!linksGerados.length) {

        alert(
          '⚠️ Nenhum pedido gerado'
        );

        return;
      }

      try {

        statusDiv.className = '';

        statusDiv.innerHTML = `
          ⏳ Preparando downloads...
        `;

        let totalBaixados = 0;

        // =========================
        // LOOP
        // =========================
        for (const item of linksGerados) {

          const token =
            item.link.split('token=')[1];

          // =========================
          // TESTA IMAGEM
          // =========================
          const imgUrl =
            `/api/comprovante/imagem?nunota=${item.nunota}&token=${token}`;

          try {

            const imgRes =
              await fetch(imgUrl);

            if (imgRes.ok) {

              const blob =
                await imgRes.blob();

              if (blob.size > 1000) {

                const url =
                  window.URL.createObjectURL(blob);

                const a =
                  document.createElement('a');

                a.href = url;

                a.download =
                  `Comprovante_${item.nunota}.jpg`;

                document.body.appendChild(a);

                a.click();

                a.remove();

                window.URL.revokeObjectURL(url);

                totalBaixados++;

                // Delay anti bloqueio
                await new Promise(r =>
                  setTimeout(r, 800)
                );

                // Se encontrou imagem,
                // não tenta PDF
                continue;
              }
            }

          } catch (err) {

            console.error(
              `Erro imagem ${item.nunota}`,
              err
            );
          }

          // =========================
          // TESTA PDF
          // =========================
          const pdfUrl =
            `/api/comprovante/pdf?nunota=${item.nunota}&token=${token}`;

          try {

            const pdfRes =
              await fetch(pdfUrl);

            if (pdfRes.ok) {

              const blob =
                await pdfRes.blob();

              if (blob.size > 1000) {

                const url =
                  window.URL.createObjectURL(blob);

                const a =
                  document.createElement('a');

                a.href = url;

                a.download =
                  `Comprovante_${item.nunota}.pdf`;

                document.body.appendChild(a);

                a.click();

                a.remove();

                window.URL.revokeObjectURL(url);

                totalBaixados++;

                await new Promise(r =>
                  setTimeout(r, 800)
                );
              }
            }

          } catch (err) {

            console.error(
              `Erro PDF ${item.nunota}`,
              err
            );
          }
        }

        // =========================
        // FINAL
        // =========================
        statusDiv.className =
          'ok';

        statusDiv.innerHTML = `
          ✅ ${totalBaixados}
          download(s) iniciado(s)
        `;

        alert(`

✅ Downloads iniciados

📂 Os arquivos foram enviados
para a pasta padrão de Downloads
do navegador.

💡 Dica:
configure o Chrome para perguntar
onde salvar os arquivos.

        `);

      } catch (err) {

        console.error(err);

        statusDiv.className =
          'erro';

        statusDiv.innerHTML = `
          ❌ ${err.message}
        `;
      }
    }

    // =========================
    // 🚀 START
    // =========================
    atualizarFiltros();

  </script>

  <footer>

    <p style="text-align:center;">
      © Top Cestas - 2026 - Sistema de rastreio de pedidos
    </p>

  </footer>

</body>

</html>
