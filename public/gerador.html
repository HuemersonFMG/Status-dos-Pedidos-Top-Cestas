<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Links de Pedidos</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button {
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>

</head>

<body>

<h2>🔗 Gerar Links de Pedidos</h2>

<input type="text" id="cnpj" placeholder="Digite CPF ou CNPJ">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

async function gerar() {

  const cnpj = document.getElementById('cnpj').value.trim();
  const data = document.getElementById('data').value;

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  if (!cnpj) {
    alert("Digite o CPF ou CNPJ");
    return;
  }

  status.innerHTML = "⏳ Gerando links...";
  div.innerHTML = "";

  try {

    console.log("📤 Enviando:", { cnpj, data });

    const res = await fetch('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cnpj, data })
    });

    console.log("📡 Status:", res.status);

    if (!res.ok) {
      throw new Error("Erro HTTP: " + res.status);
    }

    const dataRes = await res.json();

    console.log("📦 Retorno:", dataRes);

    if (!dataRes.links || !dataRes.links.length) {
      status.innerHTML = "⚠️ Nenhum link encontrado";
      return;
    }

    status.innerHTML = `✅ ${dataRes.links.length} link(s) gerado(s)`;

    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

  } catch (err) {

    console.error("❌ Erro:", err);

    status.innerHTML = "❌ Erro ao gerar links";
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link);
  alert("Link copiado!");
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

</body>
</html>
