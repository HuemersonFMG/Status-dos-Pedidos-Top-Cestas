<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Top - Gerador</title>

<link rel="stylesheet" href="Styles/Styles.css">
<link rel="icon" href="https://tutoriaissankhya.netlify.app/img/IcoTop.png">

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 { margin-bottom: 10px; }

input, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}

button { cursor: pointer; }

#status {
  margin-top: 10px;
  font-weight: bold;
}

.ok { color: green; }
.erro { color: red; }
.warn { color: orange; }

.link-box {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  word-break: break-all;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <a href="https://topalimentos.shop/produtos/">
    <img src="https://acdn.mitiendanube.com/stores/005/153/537/themes/common/logo.png"
         alt="Logo Top Cestas">
  </a>
  <h1>Gerador de Links de Pedidos</h1>
</header>

<h2>🔗 Gerar Links</h2>

<input type="text" id="cnpj" placeholder="CPF ou CNPJ">
<input type="text" id="ordemCarga" placeholder="Ordem de Carga">
<input type="date" id="data">

<button onclick="gerar()">Gerar Links</button>

<div id="status"></div>
<div id="resultado"></div>

<script>

// =========================
// 🔧 HELPERS
// =========================
function limparDoc(valor) {
  return (valor || "").replace(/\D/g, '');
}

// =========================
// 🔁 CONTROLE EXCLUSIVO
// =========================
const cnpjInput = document.getElementById('cnpj');
const ordemInput = document.getElementById('ordemCarga');

cnpjInput.addEventListener('input', () => {
  ordemInput.disabled = !!cnpjInput.value.trim();
  if (cnpjInput.value) ordemInput.value = "";
});

ordemInput.addEventListener('input', () => {
  cnpjInput.disabled = !!ordemInput.value.trim();
  if (ordemInput.value) cnpjInput.value = "";
});

// =========================
// ⏱️ FETCH SEGURO
// =========================
async function fetchSeguro(url, options) {

  const res = await fetch(url, options);
  const text = await res.text();

  if (!text) {
    throw new Error("Resposta vazia do servidor");
  }

  let data;

  try {
    data = JSON.parse(text);
  } catch {
    console.error("❌ Resposta inválida:", text);
    throw new Error("Erro ao processar resposta do servidor");
  }

  if (!res.ok) {
    throw new Error(data.erro || "Erro na requisição");
  }

  return data;
}

// =========================
// 🔍 GERAR LINKS
// =========================
async function gerar() {

  const documento = limparDoc(cnpjInput.value);
  const ordem = ordemInput.value.trim();
  const data = document.getElementById('data').value;

  const status = document.getElementById('status');
  const div = document.getElementById('resultado');

  div.innerHTML = "";

  // 🔥 VALIDAÇÃO
  if (!documento && !ordem) {
    status.className = "erro";
    status.innerHTML = "❌ Informe CPF/CNPJ ou Ordem de Carga";
    return;
  }

  if (documento && ordem) {
    status.className = "erro";
    status.innerHTML = "❌ Use apenas um filtro por vez";
    return;
  }

  if (documento && documento.length !== 11 && documento.length !== 14) {
    status.className = "erro";
    status.innerHTML = "❌ CPF (11) ou CNPJ (14)";
    return;
  }

  status.className = "";
  status.innerHTML = "⏳ Buscando pedidos...";

  try {

    const payload = {
      cnpj: documento || null,
      ordemCarga: ordem || null,
      data: data || null
    };

    const dataRes = await fetchSeguro('/api/gerar-links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!dataRes.links || !dataRes.links.length) {
      status.className = "warn";
      status.innerHTML = "⚠️ Nenhum pedido encontrado";
      return;
    }

    status.className = "ok";
    status.innerHTML = `✅ ${dataRes.total} pedido(s) encontrado(s)`;

    // 🔗 LISTAGEM
    dataRes.links.forEach(l => {

      const el = document.createElement('div');
      el.className = "link-box";

      el.innerHTML = `
        <b>Pedido:</b> ${l.nunota}<br>
        <a href="${l.link}" target="_blank">${l.link}</a>

        <div class="actions">
          <button onclick="copiar('${l.link}')">📋 Copiar</button>
          <button onclick="abrir('${l.link}')">🔗 Abrir</button>
          <button onclick="whatsapp('${l.link}')">📲 WhatsApp</button>
        </div>
      `;

      div.appendChild(el);
    });

  } catch (err) {

    console.error("❌ Erro:", err);

    status.className = "erro";
    status.innerHTML = `❌ ${err.message}`;
  }
}

// =========================
// 📋 COPIAR
// =========================
function copiar(link) {
  navigator.clipboard.writeText(link)
    .then(() => alert("Link copiado!"))
    .catch(() => alert("Erro ao copiar"));
}

// =========================
// 🔗 ABRIR
// =========================
function abrir(link) {
  window.open(link, "_blank");
}

// =========================
// 📲 WHATSAPP
// =========================
function whatsapp(link) {
  const texto = encodeURIComponent("Acompanhe seu pedido:\n" + link);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

</script>

<footer>
  <p style="text-align:center;">
    © Top Cestas - 2026 - Sistema de rastreio de pedidos
  </p>
</footer>

</body>
</html>
